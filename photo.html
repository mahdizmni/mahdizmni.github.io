<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>photos</title>
    <style>
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ECF0F1; color: #000000; line-height: 1.6;
        }
        
        /* Header */
        header { text-align: center; padding: 4rem 2rem 2rem; }
        h1 { font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #888; }

        /* True Masonry Gallery */
        .gallery {
            column-count: 3; column-gap: 1.5rem; padding: 2rem;
            max-width: 1400px; margin: 0 auto;
        }
        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 600px) { .gallery { column-count: 1; } }

        /* Image Styling */
        .gallery-item {
            break-inside: avoid; margin-bottom: 1.5rem;
            border-radius: 4px; background-color: #1e1e1e; overflow: hidden;
        }
        .gallery-item img {
            width: 100%; height: auto; display: block;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.03); opacity: 0.9; cursor: pointer;
        }

        /* Lightbox (Full Screen Viewer) Styles */
        .lightbox {
            display: none; position: fixed; z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center; align-items: center;
        }
        .lightbox img {
            max-width: 95vw; max-height: 95vh;
            object-fit: contain; border-radius: 4px;
        }
        .lightbox-close {
            position: absolute; top: 20px; right: 40px;
            color: #ccc; font-size: 50px; cursor: pointer;
            transition: color 0.2s;
        }
        .lightbox-close:hover { color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>Mephory</h1>
        <p>A few</p>
    </header>

    <main class="gallery">
        <div class="gallery-item">
            <img src="files/thumbnails/Veronese_Allegory_of_Wisdom_and_Strength.jpg" data-fullres="files/images/Veronese_Allegory_of_Wisdom_and_Strength.jpg" alt="Veronese Allegory Of Wisdom And Strength" title="Veronese Allegory Of Wisdom And Strength" onclick="openLightbox(this)">
        </div>
    </main>

    <!-- The Lightbox Overlay -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Full Resolution Image">
    </div>

    <script>
        function openLightbox(imgElement) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            // Grabs the high-res path from the data attribute
            lightboxImg.src = imgElement.getAttribute('data-fullres');
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('lightbox-img').src = '';
        }

        // Close lightbox when hitting the Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeLightbox();
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #121212; /* Dark theme makes photos pop */
            color: #ffffff;
            line-height: 1.6;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 4rem 2rem 2rem;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #888;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            /* Creates a responsive grid: minimum 300px width, fills available space */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Image Styling */
        .gallery-item {
            overflow: hidden;
            border-radius: 4px;
            background-color: #1e1e1e;
        }
        .gallery-item img {
            width: 100%;
            height: 400px; /* Forces uniform height */
            object-fit: cover; /* Prevents image distortion */
            display: block;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.03);
            opacity: 0.9;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Photography</h1>
        <p>Selected Works</p>
    </header>

    <main class="gallery">
        <!-- Replace the src with the paths to your actual images -->
        <div class="gallery-item">
            <img src="images/photo1.jpeg" alt="Description of photo 1">
        </div>
        <div class="gallery-item">
            <img src="images/photo2.jpeg" alt="Description of photo 2">
        </div>
        <div class="gallery-item">
            <img src="images/photo3.jpeg" alt="Description of photo 3">
        </div>
        <div class="gallery-item">
            <img src="images/photo4.jpeg" alt="Description of photo 4">
        </div>
        <div class="gallery-item">
            <img src="images/photo5.jpeg" alt="Description of photo 5">
        </div>
        <div class="gallery-item">
            <img src="images/photo6.jpeg" alt="Description of photo 6">
        </div>
    </main>

</body>
</html>

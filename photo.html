<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #121212;
            color: #ffffff;
            line-height: 1.6;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 4rem 2rem 2rem;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #888;
        }

        /* True Masonry Gallery (Preserves Aspect Ratios) */
        .gallery {
            column-count: 3;
            column-gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Responsive columns for smaller screens */
        @media (max-width: 900px) {
            .gallery {
                column-count: 2;
            }
        }
        @media (max-width: 600px) {
            .gallery {
                column-count: 1;
            }
        }

        /* Image Styling */
        .gallery-item {
            break-inside: avoid; /* Prevents an image from being split across columns */
            margin-bottom: 1.5rem;
            border-radius: 4px;
            background-color: #1e1e1e;
            overflow: hidden;
        }
        
        .gallery-item img {
            width: 100%;
            height: auto; /* Allows the image to keep its original aspect ratio */
            display: block;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.03);
            opacity: 0.9;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Photography</h1>
        <p>Selected Works</p>
    </header>
<main class="gallery">
        <div class="gallery-item">
            <img src="files/images/photo1.jpeg" alt="Mountain landscape at dawn" title="Mountain landscape at dawn">
        </div>
        <div class="gallery-item">
            <img src="files/images/photo2.jpeg" alt="Street photography in the city" title="Street photography in the city">
        </div>
        <div class="gallery-item">
            <img src="files/images/photo3.jpeg" alt="Macro shot of a flower" title="Macro shot of a flower">
        </div>
        <div class="gallery-item">
            <img src="files/images/photo4.jpeg" alt="Portrait in natural light" title="Portrait in natural light">
        </div>
        <div class="gallery-item">
            <img src="files/images/photo5.jpeg" alt="Abstract architectural details" title="Abstract architectural details">
        </div>
        <div class="gallery-item">
            <img src="files/images/photo6.jpeg" alt="Long exposure night traffic" title="Long exposure night traffic">
        </div>
    </main>

</body>
</html>
